spring:
  application:
    name: ORDER-SERVICE
  mongodb:
    uri: mongodb://localhost:27017
    database: product_db

server:
  port: 9192

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost